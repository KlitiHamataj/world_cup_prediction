name: Update Match Data

on:
  schedule:
    # Every hour during the World Cup — adjust as needed
    - cron: '0 * * * *'

  # Also allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          echo "FOOTBALL_DATA_API_KEY=${{ secrets.FOOTBALL_DATA_API_KEY }}" > .env
          echo "ODDS_API_KEY=${{ secrets.ODDS_API_KEY }}" >> .env

      - name: Run pipeline
        run: python -m src.pipeline --all

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/football.db
          git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push